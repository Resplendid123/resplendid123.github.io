---
layout: default
nav: tags
title: Tags
---
<article class="px-1">
  <h1 class="dynamic-title">Tags</h1>
  <div class="content">
    <div id="tags" data-tags-page>
      {% assign tags = site.tags | sort %}
      {% for tag in tags %}
        <div>
          <a class="tag" id="{{ tag[0] | slugify }}" href="#{{ tag[0] | slugify }}">
            {{ tag[0] }}<span class="text-muted">{{ tag[1].size }}</span>
          </a>
        </div>
      {% endfor %}
    </div>
    <section id="tag-results" aria-live="polite">
      <h2 id="tag-results-title"></h2>
      <div id="tag-results-list"></div>
    </section>
  </div>
</article>
